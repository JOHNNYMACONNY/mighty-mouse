# scout_config.yaml
# Phase 38A Scout Run Configuration (Full Parity with v2_lean)
name: "Mighty Mouse v2 - Scout Run"
version: "2.0.0"
provider: "ollama"
model: "gemma4:e4b"
temperature: 0.1
max_tokens: 4000
allow_simulation: false
prompt_segments:
  - "prompt_segments/lean_protocol.txt"
  - "prompt_segments/constraints.txt"
  - "prompt_segments/verification.txt"
  - "prompt_segments/tools.txt"
system_prompt_path: "system_prompt.txt"

# Research parameters
