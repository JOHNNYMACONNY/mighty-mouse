    - "task_038_file_observer_enricher.json"
    - "task_039_network_service_enricher.json"
    - "task_040_legacy_decorator_circuitbreaker.json"
  tier_6:
    - "task_1000_file_visitor_retry.json"
    - "task_1001_local_cache_ratelimiter.json"
    - "task_1002_legacy_bridge_enricher.json"
    - "task_1003_realtime_facade_filter.json"
    - "task_1004_stream_adapter_retry.json"
  tier_7:
    - "task_1401_memory_template_validator.json"
    - "task_1402_async_iterator_circuitbreaker.json"
    - "task_1403_memory_queue_transformer.json"
    - "task_1404_stream_visitor_transformer.json"
    - "task_1405_local_adapter_circuitbreaker.json"
